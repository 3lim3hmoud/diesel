<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#020403">
<title>DIESEL // Mission Board</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
<style>
  .filters{ display:flex; gap:8px; padding:0 28px 18px; flex-wrap:wrap; }
  .filter-btn{ font-family:'Share Tech Mono', monospace; font-size:11px; letter-spacing:1px; color:var(--muted); border:1px solid var(--line); padding:6px 14px; border-radius:20px; cursor:pointer; background:transparent; }
  .filter-btn.active{ color:var(--green); border-color:var(--green-dim); background:rgba(57,255,106,0.06); }

  .mission-list{ display:flex; flex-direction:column; gap:1px; background:var(--line); margin:0 28px 26px; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .mission-card{ background:rgba(10,18,12,0.7); padding:16px 18px; display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:center; }
  .mission-card .left{ flex:1; min-width:220px; }
  .mission-card .title{ font-family:'Rajdhani', sans-serif; font-weight:700; font-size:17px; color:#f2f3f5; letter-spacing:.5px; display:flex; align-items:center; gap:10px; }
  .mission-card .brief{ font-size:13px; color:#a9afb6; margin-top:4px; line-height:1.5; max-width:520px; }
  .mission-card .meta{ font-family:'Share Tech Mono', monospace; font-size:10.5px; color:var(--muted); margin-top:6px; letter-spacing:.5px; }
  .mission-card .right{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .mission-card[data-status="locked"]{ opacity:0.55; }
</style>
</head>
<body>
<canvas id="matrixRain"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>

<div class="wrap">
  <div class="browser-chrome">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <div class="url-bar">http://<span>command-node-01.mesh</span>/diesel/missions</div>
    <div class="sys-tag" id="opsTag">24 OPS</div>
  </div>

  <div class="page">
    <nav class="navbar">
      <a href="index.html">HOME</a>
      <a href="command.html">COMMAND</a>
      <a href="crew.html">CREW</a>
      <a href="missions.html" class="active">MISSIONS</a>
      <a href="wallet.html">WALLET</a>
      <a href="archive.html">ARCHIVE</a>
      <a href="messages.html">MESSAGES</a>
      <a href="alerts.html">ALERTS</a>
      <a href="map.html">MAP</a>
      <a href="settings.html">SETTINGS</a>
    </nav>

    <div class="subhead">
      <h1>// MISSION BOARD</h1>
      <p><span id="closedCount">750</span> MISSIONS CLOSED TO DATE &middot; <span id="activeCount">24</span> CURRENT OPS BELOW &middot; CLAIM TO ASSIGN YOURSELF</p>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-f="all" onclick="filterMissions('all', this)">ALL</button>
      <button class="filter-btn" data-f="active" onclick="filterMissions('active', this)">ACTIVE</button>
      <button class="filter-btn" data-f="claimed" onclick="filterMissions('claimed', this)">CLAIMED</button>
      <button class="filter-btn" data-f="completed" onclick="filterMissions('completed', this)">COMPLETED</button>
      <button class="filter-btn" data-f="locked" onclick="filterMissions('locked', this)">LOCKED</button>
    </div>

    <div class="mission-list" id="missionList">
      <!-- mission cards injected by script -->
    </div>

    <div class="footer">COMMAND SYSTEM // AL-MORADI EL-DIESEL &middot; <b>PERSONA PROJECT</b></div>
  </div>
</div>

<script src="js/matrix.js"></script>
<script src="js/state.js"></script>
<script src="js/missions-data.js"></script>
<script src="js/achievements-data.js"></script>
<script src="js/sound.js"></script>
<script src="js/ui.js"></script>
<script>
function badgeFor(status){
  const map = {
    active: '<span class="badge">ACTIVE</span>',
    claimed: '<span class="badge acid">CLAIMED</span>',
    completed: '<span class="badge muted">COMPLETED</span>',
    locked: '<span class="badge warn">LOCKED</span>'
  };
  return map[status];
}

let currentFilter = 'all';

function render(){
  const list = document.getElementById('missionList');
  list.innerHTML = '';

  const counts = missionCounts();
  document.getElementById('opsTag').textContent = counts.active + ' OPS';
  document.getElementById('activeCount').textContent = counts.active;
  document.getElementById('closedCount').textContent = 750 + DieselState.get().completedMissions.length;

  MISSIONS.forEach(m => {
    const status = missionStatusOf(m);
    if(currentFilter !== 'all' && currentFilter !== status) return;

    const card = document.createElement('div');
    card.className = 'mission-card';
    card.dataset.status = status;

    let actionHtml = '';
    if(status === 'active'){
      actionHtml = `<button class="btn" onclick="claim('${m.id}')">CLAIM</button>`;
    } else if(status === 'claimed'){
      actionHtml = `<button class="btn solid" onclick="complete('${m.id}')">MARK COMPLETE</button>`;
    } else if(status === 'locked'){
      actionHtml = `<button class="btn" disabled>CLEARANCE REQ.</button>`;
    } else {
      actionHtml = `<span class="badge muted">DONE</span>`;
    }

    card.innerHTML = `
      <div class="left">
        <div class="title">${m.title}</div>
        <div class="brief">${m.brief}</div>
        <div class="meta">DIFFICULTY: ${m.diff} &middot; REWARD: ${m.reward}</div>
      </div>
      <div class="right">${badgeFor(status)}${actionHtml}</div>
    `;
    list.appendChild(card);
  });
}

function claim(id){
  DieselSound.toggle();
  DieselState.claimMission(id);
  render();
  DieselUI.toast('Mission claimed \u2014 get to it', { kind:'info' });
}

function complete(id){
  const m = MISSIONS.find(x => x.id === id);
  const result = DieselState.completeMission(id, m ? m.diff : null, m ? m.reward : null, m ? m.title : id);
  if(result.leveledUp) DieselSound.levelUp();
  else DieselSound.success();
  render();
  showXpToast(result);
  if(result.tx){
    setTimeout(() => DieselUI.toast(`+$${result.tx.amount.toLocaleString()} added to wallet`, { kind:'ok' }), result.leveledUp ? 900 : 600);
  }
  if(result.newAchievements && result.newAchievements.length){
    result.newAchievements.forEach((a, i) => {
      setTimeout(() => DieselUI.toast(`Achievement unlocked: ${a.name}`, { kind:'warn', duration:2600 }), 1300 + i * 700);
    });
  }
}

function showXpToast(result){
  DieselUI.toast(
    result.leveledUp
      ? `+${result.gained} XP \u00b7 RANK UP \u2192 ${result.after.label} (TIER ${result.after.tier})`
      : `+${result.gained} XP`,
    { kind: result.leveledUp ? 'warn' : 'ok', duration: result.leveledUp ? 2800 : 1800 }
  );
}

function filterMissions(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('service-worker.js').catch(() => {}); });
}
</script>
</body>
</html>
