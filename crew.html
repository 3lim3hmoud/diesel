<style>
  .crew-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:1px; background:var(--line); margin:0 28px 26px; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  .crew-card{ background:rgba(10,18,12,0.7); padding:18px; }
  .crew-card .top{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .crew-card .ic{ width:42px; height:42px; border-radius:10px; background:#0a120c; border:1px solid var(--green-dim); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .crew-card .nm{ font-family:'Rajdhani', sans-serif; font-weight:700; font-size:17px; color:#f2f3f5; letter-spacing:.5px; }
  .crew-card .rl{ font-family:'Share Tech Mono', monospace; font-size:10.5px; color:var(--green); letter-spacing:1px; }
  .crew-card .desc{ font-size:13px; color:#a9afb6; line-height:1.5; margin-bottom:10px; }
  .crew-card .meta{ display:flex; justify-content:space-between; align-items:center; }
  .status-dot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; }
  .status-dot.on{ background:var(--green); box-shadow:0 0 6px var(--green); }
  .status-dot.mission{ background:var(--acid); }
  .status-dot.off{ background:var(--muted); }
  .status-txt{ font-family:'Share Tech Mono', monospace; font-size:10.5px; color:var(--muted); }
  .crew-card{ cursor:pointer; transition:background .15s ease; }
  .crew-card:hover{ background:rgba(57,255,106,0.05); }
  .crew-card:focus-visible{ outline:2px solid var(--green); outline-offset:-2px; }

  /* ---- crew detail modal (reuses .dui-overlay/.dui-modal shell, wider variant) ---- */
  .dui-modal.crew-modal{ max-width:480px; }
  .crew-modal .cm-top{ display:flex; align-items:center; gap:14px; margin-bottom:14px; }
  .crew-modal .cm-ic{ width:56px; height:56px; border-radius:12px; background:#0a120c; border:1px solid var(--green-dim); display:flex; align-items:center; justify-content:center; font-size:26px; flex-shrink:0; }
  .crew-modal .cm-nm{ font-family:'Rajdhani', sans-serif; font-weight:800; font-size:20px; color:#f2f3f5; }
  .crew-modal .cm-rl{ font-family:'Share Tech Mono', monospace; font-size:11px; color:var(--green); letter-spacing:1px; margin-top:2px; }
  .crew-modal .cm-desc{ font-size:14px; color:#c9cdd3; line-height:1.6; margin-bottom:16px; }
  .crew-modal .cm-stats{ display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .crew-modal .cm-stat{ flex:1; min-width:110px; background:rgba(6,10,7,0.5); border:1px solid var(--line); border-radius:8px; padding:10px 12px; }
  .crew-modal .cm-stat .n{ font-family:'Share Tech Mono', monospace; font-size:17px; color:var(--acid); font-weight:700; }
  .crew-modal .cm-stat .l{ font-family:'Share Tech Mono', monospace; font-size:9.5px; color:var(--muted); letter-spacing:1px; margin-top:2px; }
  .crew-modal .cm-section{ font-family:'Share Tech Mono', monospace; font-size:10.5px; letter-spacing:2px; color:var(--muted); margin:14px 0 8px; }
  .crew-modal .cm-log{ display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .crew-modal .cm-log-row{ display:flex; justify-content:space-between; font-family:'Share Tech Mono', monospace; font-size:11.5px; padding:6px 0; border-bottom:1px dashed var(--line); }
  .crew-modal .cm-rel{ font-size:13px; color:#a9afb6; line-height:1.6; font-style:italic; }
  .crew-modal .cm-close{ margin-top:6px; width:100%; }
</style>
</head>
<body>

<script src="js/matrix.js"></script>

<script>
// live-computed "who's actually out on assignment right now" — reads real
// pending dispatches from the map system instead of trusting the static status field
function activeAssignments(){
  const map = {};
  if(!window.DieselState) return map;
  DieselState.getDispatches().filter(d => d.status === 'pending' && d.operative).forEach(d => {
    const remainMs = Math.max(0, (d.ts + DieselState.DISPATCH_DELAY_MS) - Date.now());
    map[d.operative] = Math.ceil(remainMs / 60000);
  });
  return map;
}

function renderCrew(){
  const grid = document.getElementById('crewGrid');
  const busy = activeAssignments();
  grid.innerHTML = CREW.map(c => {
    const eta = busy[c.id];
    const statusHtml = (eta !== undefined)
      ? `<span class="status-txt"><span class="status-dot mission"></span>ON ASSIGNMENT &middot; back in ~${eta}m</span>`
      : `<span class="status-txt"><span class="status-dot ${c.status}"></span>${STATUS_LABEL[c.status]}</span>`;
    return `
    <div class="crew-card" tabindex="0" role="button" aria-label="View ${c.nm} details"
      onclick="openCrewModal('${c.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openCrewModal('${c.id}');}">
      <div class="top"><div class="ic">${avatarSVG(c)}</div><div><div class="nm">${c.nm}</div><div class="rl">${c.rl}</div></div></div>
      <div class="desc">${c.desc}</div>
      <div class="meta">${statusHtml}<span class="badge">LVL ${c.lvl}</span></div>
    </div>`;
  }).join('');
}

function openCrewModal(id){
  const c = CREW.find(x => x.id === id);
  if(!c) return;

  const overlay = document.createElement('div');
  overlay.className = 'dui-overlay';
  overlay.innerHTML = `
    <div class="dui-modal crew-modal" role="dialog" aria-modal="true">
      <div class="cm-top">
        <div class="cm-ic">${avatarSVG(c)}</div>
        <div>
          <div class="cm-nm">${c.nm}</div>
          <div class="cm-rl">${c.rl} &middot; LVL ${c.lvl} &middot; ${STATUS_LABEL[c.status]}</div>
        </div>
      </div>
      <div class="cm-desc">${c.desc}</div>
      <div class="cm-stats">
        <div class="cm-stat"><div class="n">${c.successRate}%</div><div class="l">SUCCESS RATE</div></div>
        <div class="cm-stat"><div class="n">${c.log.length}</div><div class="l">LOGGED OPS</div></div>
        <div class="cm-stat"><div class="n">LVL ${c.lvl}</div><div class="l">CLEARANCE</div></div>
      </div>
      <div class="cm-section">// RECENT MISSION LOG</div>
      <div class="cm-log">
        ${c.log.map(l => `<div class="cm-log-row"><span>${l.t}</span><span class="badge ${l.r === 'SUCCESS' ? 'acid' : 'warn'}">${l.r}</span></div>`).join('')}
      </div>
      <div class="cm-section">// RELATIONSHIP TO COMMAND</div>
      <div class="cm-rel">${c.relationship}</div>
      ${(() => { const st = stationOf(c.id); return st
        ? `<div class="cm-section">// FIELD STATION</div><div class="cm-rel">Garrisoned at <b style="color:var(--green);">${st}</b> on the operations map.</div>
           <button class="btn cm-close" style="border-color:var(--green-dim); background:rgba(57,255,106,0.08); color:var(--green); margin-top:8px;" onclick="location.href='map.html?node=${st}'">VIEW ON MAP</button>`
        : `<div class="cm-section">// FIELD STATION</div><div class="cm-rel">Mobile — not tied to a fixed node, free to lead any operation from the map.</div>`;
      })()}
      <button class="btn cm-close" data-a="close">CLOSE</button>
    </div>`;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('in'));

  const close = () => {
    overlay.classList.remove('in');
    overlay.classList.add('out');
    setTimeout(() => overlay.remove(), 200);
  };
  overlay.addEventListener('click', (e) => {
    if(e.target === overlay || e.target.closest('[data-a="close"]')) close();
  });
  overlay.addEventListener('keydown', (e) => { if(e.key === 'Escape') close(); });
}

renderCrew();
setInterval(renderCrew, 20000); // keep ETAs fresh without needing a refresh

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('service-worker.js').catch(() => {}); });
}
</script>
</body>
